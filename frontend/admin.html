<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Panel - Le Gourmet</title>
    <link rel="stylesheet" href="css/admin.css">

</head>
<body>
    <header class="navbar" id="navbar"></header>

    <main class="container">
        <h1 class="page-title">Admin Panel</h1>

        <div class="tabs" id="tabs">
            <button class="tab active" data-tab="plats">Dishes</button>
            <button class="tab" data-tab="categories">Categories</button>
            <button class="tab" data-tab="tables">Tables</button>
            <button class="tab" data-tab="users">Users</button>
            <button class="tab" data-tab="orders">Orders</button>
            <button class="tab" data-tab="reservations">Reservations</button>
            <button class="tab" data-tab="payments">Payments</button>
            <button class="tab" data-tab="contacts">Contacts</button>
            <button class="tab" data-tab="reclamations">Complaints</button>
            <button class="tab" data-tab="staff">Staff</button>
            <button class="tab" data-tab="chef-schedules">Chef Schedules</button>
            <button class="tab" data-tab="emp-schedules">Employee Schedules</button>
            <button class="tab" data-tab="leave-requests">Leave Requests</button>
        </div>

        <section class="tab-content active" id="tab-plats">
            <h3>Add dish</h3>
            <form id="plat-form" class="card">
                <div class="form-row">
                    <div class="form-group"><label>Name</label><input id="p-name" required></div>
                    <div class="form-group"><label>Price</label><input id="p-price" type="number" step="0.01" required></div>
                    <div class="form-group"><label>Category</label><select id="p-category"></select></div>
                </div>
                <div class="form-group"><label>Description</label><textarea id="p-desc"></textarea></div>
                <button class="btn">Add dish</button>
            </form>
            <div id="plats-list" class="mt-3"></div>
        </section>

        <section class="tab-content" id="tab-categories">
            <h3>Add category</h3>
            <form id="cat-form" class="card">
                <div class="form-group"><label>Name</label><input id="c-name" required></div>
                <button class="btn">Add</button>
            </form>
            <div id="cats-list" class="mt-3"></div>
        </section>

        <section class="tab-content" id="tab-tables">
            <h3>Add table</h3>
            <form id="table-form" class="card">
                <div class="form-row">
                    <div class="form-group"><label>Number</label><input id="t-number" type="number" required></div>
                    <div class="form-group"><label>Capacity</label><input id="t-capacity" type="number" required></div>
                    <div class="form-group"><label>Status</label>
                        <select id="t-status">
                            <option value="available">available</option>
                            <option value="occupied">occupied</option>
                            <option value="reserved">reserved</option>
                        </select>
                    </div>
                </div>
                <button class="btn">Add</button>
            </form>
            <div id="tables-list" class="mt-3"></div>
        </section>

        <section class="tab-content" id="tab-users">
            <div id="users-list"></div>
        </section>

        <section class="tab-content" id="tab-orders">
            <div id="orders-list"></div>
        </section>

        <section class="tab-content" id="tab-reservations">
            <div id="reservations-list"></div>
        </section>

        <section class="tab-content" id="tab-payments">
            <h3>Record payment</h3>
            <form id="pay-form" class="card">
                <div class="form-row">
                    <div class="form-group"><label>Order ID</label><input id="pay-commande" type="number" required></div>
                    <div class="form-group"><label>Total</label><input id="pay-total" type="number" step="0.01" required></div>
                    <div class="form-group"><label>Method</label>
                        <select id="pay-method"><option>cash</option><option>card</option><option>online</option></select>
                    </div>
                    <div class="form-group"><label>Status</label>
                        <select id="pay-status"><option>pending</option><option>completed</option><option>failed</option></select>
                    </div>
                </div>
                <button class="btn">Save</button>
            </form>
            <div id="payments-list" class="mt-3"></div>
        </section>

        <section class="tab-content" id="tab-contacts">
            <div id="contacts-list"></div>
        </section>

        <section class="tab-content" id="tab-reclamations">
            <div id="reclamations-list"></div>
        </section>

        <section class="tab-content" id="tab-staff">
            <h3>Add Staff Member</h3>
            <form id="staff-form" class="card">
                <div class="form-row">
                    <div class="form-group"><label>Name</label><input id="s-name" required></div>
                    <div class="form-group"><label>Email</label><input id="s-email" type="email" required></div>
                    <div class="form-group"><label>Password</label><input id="s-pass" type="password" required minlength="6"></div>
                    <div class="form-group"><label>Role</label>
                        <select id="s-role"><option value="chef">Chef</option><option value="employee">Employee</option></select>
                    </div>
                </div>
                <button class="btn">Add Staff</button>
            </form>
            <div id="staff-list" class="mt-3"></div>
        </section>

        <section class="tab-content" id="tab-chef-schedules">
            <h3>Add Chef Schedule</h3>
            <form id="cs-form" class="card">
                <div class="form-row">
                    <div class="form-group"><label>Chef</label><select id="cs-chef" required></select></div>
                    <div class="form-group"><label>Date</label><input id="cs-date" type="date" required></div>
                    <div class="form-group"><label>Start</label><input id="cs-start" type="time" required></div>
                    <div class="form-group"><label>End</label><input id="cs-end" type="time" required></div>
                </div>
                <button class="btn">Add Schedule</button>
            </form>
            <div id="cs-list" class="mt-3"></div>
        </section>

        <section class="tab-content" id="tab-emp-schedules">
            <h3>Add Employee Schedule</h3>
            <form id="es-form" class="card">
                <div class="form-row">
                    <div class="form-group"><label>Employee</label><select id="es-emp" required></select></div>
                    <div class="form-group"><label>Date</label><input id="es-date" type="date" required></div>
                    <div class="form-group"><label>Start</label><input id="es-start" type="time" required></div>
                    <div class="form-group"><label>End</label><input id="es-end" type="time" required></div>
                    <div class="form-group"><label>Task</label><input id="es-task" placeholder="Optional task"></div>
                </div>
                <button class="btn">Add Schedule</button>
            </form>
            <div id="es-list" class="mt-3"></div>
        </section> 

        <section class="tab-content" id="tab-leave-requests">
            <div id="lr-list"></div>
        </section>
    </main>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
