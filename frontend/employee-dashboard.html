<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Employee Dashboard - Le Gourmet</title>
    <link rel="stylesheet" href="css/employee-dashboard.css">
    <style>
        .tabs { display:flex; gap:4px; border-bottom:1px solid var(--border); margin-bottom:20px; flex-wrap:wrap; }
        .tab { padding:10px 16px; cursor:pointer; border:none; background:transparent; font-size:14px; font-weight:500; color:var(--muted); }
        .tab.active { color: var(--primary); border-bottom: 2px solid var(--primary); }
        .tab-content { display:none; }
        .tab-content.active { display:block; }
    </style>
</head>
<body>
    <header class="navbar" id="navbar"></header>

    <main class="container">
        <h1 class="page-title" id="welcome">Employee Dashboard</h1>

        <div id="summary" class="grid"></div>

        <div class="tabs mt-3" id="tabs">
            <button class="tab active" data-tab="schedule">My Schedule</button>
            <button class="tab" data-tab="tasks">My Tasks</button>
            <button class="tab" data-tab="leave-apply">Apply for Leave</button>
            <button class="tab" data-tab="leave-history">Leave History</button>
        </div>

        <section class="tab-content active" id="tab-schedule">
            <h3>Upcoming Shifts</h3>
            <div id="schedule-list"></div>
        </section>

        <section class="tab-content" id="tab-tasks">
            <h3>Assigned Tasks</h3>
            <div id="tasks-list"></div>
        </section>

        <section class="tab-content" id="tab-leave-apply">
            <h3>Request Leave</h3>
            <form id="leave-form" class="card">
                <div class="form-row">
                    <div class="form-group"><label>Start Date</label><input type="date" id="lr-start" required></div>
                    <div class="form-group"><label>End Date</label><input type="date" id="lr-end" required></div>
                </div>
                <div class="form-group"><label>Reason (optional)</label><textarea id="lr-reason"></textarea></div>
                <button class="btn">Submit Request</button>
            </form>
            <div id="leave-alert" class="mt-2"></div>
        </section>

        <section class="tab-content" id="tab-leave-history">
            <h3>My Leave Requests</h3>
            <div id="leave-list"></div>
        </section>
    </main>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const user = auth.requireAuth('employee');
        if (user) {
            auth.renderNavbar();
            document.getElementById('welcome').textContent = `Hello, ${user.name}`;

            const esc = s => String(s ?? '').replace(/</g, '&lt;');

            // Tabs
            document.querySelectorAll('#tabs .tab').forEach(t => t.addEventListener('click', () => {
                document.querySelectorAll('#tabs .tab').forEach(x => x.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
                t.classList.add('active');
                document.getElementById('tab-' + t.dataset.tab).classList.add('active');
            }));

            // Summary
            Promise.all([
                api.get('/employee-schedules').catch(() => ({ data: [] })),
                api.get('/leave-requests').catch(() => ({ data: [] })),
            ]).then(([sched, leaves]) => {
                const schedules = sched.data || [];
                const leaveReqs = leaves.data || [];
                const tasks = schedules.filter(s => s.role_task).length;
                document.getElementById('summary').innerHTML = `
                    <div class="card"><h3>Upcoming Shifts</h3><div class="price">${schedules.length}</div></div>
                    <div class="card"><h3>Assigned Tasks</h3><div class="price">${tasks}</div></div>
                    <div class="card"><h3>Leave Requests</h3><div class="price">${leaveReqs.length}</div></div>
                `;
            });

            // Schedule
            async function loadSchedule() {
                const rows = (await api.get('/employee-schedules')).data || [];
                const el = document.getElementById('schedule-list');
                if (!rows.length) { el.innerHTML = '<p class="muted">No shifts scheduled.</p>'; return; }
                el.innerHTML = `
                    <table class="table">
                        <thead><tr><th>Date</th><th>Start</th><th>End</th><th>Task</th></tr></thead>
                        <tbody>
                            ${rows.map(r => `
                                <tr>
                                    <td>${esc(r.working_date)}</td>
                                    <td>${esc(r.shift_start)}</td>
                                    <td>${esc(r.shift_end)}</td>
                                    <td>${esc(r.role_task || '-')}</td>
                                </tr>`).join('')}
                        </tbody>
                    </table>`;
            }

            // Tasks (filtered from schedule)
            async function loadTasks() {
                const rows = (await api.get('/employee-schedules')).data || [];
                const tasks = rows.filter(r => r.role_task);
                const el = document.getElementById('tasks-list');
                if (!tasks.length) { el.innerHTML = '<p class="muted">No tasks assigned.</p>'; return; }
                el.innerHTML = `
                    <table class="table">
                        <thead><tr><th>Date</th><th>Shift</th><th>Task</th></tr></thead>
                        <tbody>
                            ${tasks.map(r => `
                                <tr>
                                    <td>${esc(r.working_date)}</td>
                                    <td>${esc(r.shift_start)} - ${esc(r.shift_end)}</td>
                                    <td>${esc(r.role_task)}</td>
                                </tr>`).join('')}
                        </tbody>
                    </table>`;
            }

            // Leave requests
            async function loadLeaves() {
                const rows = (await api.get('/leave-requests')).data || [];
                const el = document.getElementById('leave-list');
                if (!rows.length) { el.innerHTML = '<p class="muted">No leave requests yet.</p>'; return; }
                el.innerHTML = `
                    <table class="table">
                        <thead><tr><th>Start</th><th>End</th><th>Reason</th><th>Status</th></tr></thead>
                        <tbody>
                            ${rows.map(r => `
                                <tr>
                                    <td>${esc(r.start_date)}</td>
                                    <td>${esc(r.end_date)}</td>
                                    <td>${esc(r.reason || '-')}</td>
                                    <td><span class="badge ${r.status}">${r.status}</span></td>
                                </tr>`).join('')}
                        </tbody>
                    </table>`;
            }

            // Leave form
            document.getElementById('leave-form').addEventListener('submit', async e => {
                e.preventDefault();
                const alertBox = document.getElementById('leave-alert');
                try {
                    await api.post('/leave-requests', {
                        start_date: document.getElementById('lr-start').value,
                        end_date:   document.getElementById('lr-end').value,
                        reason:     document.getElementById('lr-reason').value || null,
                    });
                    alertBox.innerHTML = '<div class="alert success">Leave request submitted!</div>';
                    e.target.reset();
                    loadLeaves();
                } catch (err) {
                    alertBox.innerHTML = `<div class="alert error">${err.message}</div>`;
                }
            });

            loadSchedule();
            loadTasks();
            loadLeaves();
        }
    </script>
</body>
</html>
