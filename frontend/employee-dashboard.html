<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Employee Dashboard - Le Gourmet</title>
    <link rel="stylesheet" href="css/employee-dashboard.css">
    <style>
        .tabs { display:flex; gap:4px; border-bottom:1px solid var(--border); margin-bottom:20px; flex-wrap:wrap; }
        .tab { padding:10px 16px; cursor:pointer; border:none; background:transparent; font-size:14px; font-weight:500; color:var(--muted); }
        .tab.active { color: var(--primary); border-bottom: 2px solid var(--primary); }
        .tab-content { display:none; }
        .tab-content.active { display:block; }
    </style>
</head>
<body>
    <header class="navbar" id="navbar"></header>

    <main class="container">
        <h1 class="page-title" id="welcome">Employee Dashboard</h1>

        <div id="summary" class="grid"></div>

        <div class="tabs mt-3" id="tabs">
            <button class="tab active" data-tab="schedule">My Schedule</button>
            <button class="tab" data-tab="tasks">My Tasks</button>
            <button class="tab" data-tab="leave-apply">Apply for Leave</button>
            <button class="tab" data-tab="leave-history">Leave History</button>
        </div>

        <section class="tab-content active" id="tab-schedule">
            <h3>Upcoming Shifts</h3>
            <div id="schedule-list"></div>
        </section>

        <section class="tab-content" id="tab-tasks">
            <h3>Assigned Tasks</h3>
            <div id="tasks-list"></div>
        </section>

        <section class="tab-content" id="tab-leave-apply">
            <h3>Request Leave</h3>
            <form id="leave-form" class="card">
                <div class="form-row">
                    <div class="form-group"><label>Start Date</label><input type="date" id="lr-start" required></div>
                    <div class="form-group"><label>End Date</label><input type="date" id="lr-end" required></div>
                </div>
                <div class="form-group"><label>Reason (optional)</label><textarea id="lr-reason"></textarea></div>
                <button class="btn">Submit Request</button>
            </form>
            <div id="leave-alert" class="mt-2"></div>
        </section>

        <section class="tab-content" id="tab-leave-history">
            <h3>My Leave Requests</h3>
            <div id="leave-list"></div>
        </section>
    </main>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/employee-dashboard.js"></script>
</body>
</html>
