<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Le Gourmet - Restaurant</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <header class="navbar" id="navbar"></header>

    <main class="container">
        <section style="text-align:center; padding: 40px 0;">
            <h1 style="font-size:42px; margin:0 0 12px;">Welcome to Le Gourmet</h1>
            <p style="font-size:18px; color:var(--muted); max-width:600px; margin:0 auto 24px;">
                Fine dining made simple. Browse our menu, book a table, and order online.
            </p>
            <a href="menu.html" class="btn">View Menu</a>
            <a href="reservations.html" class="btn btn-secondary">Book a Table</a>
        </section>

        <section class="mt-3">
            <h2 class="page-title">Latest Reviews</h2>
            <div id="reviews" class="grid"></div>
        </section>
    </main>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        auth.renderNavbar();
        api.get('/avis', { auth: false })
            .then(r => {
                const el = document.getElementById('reviews');
                if (!r.data || !r.data.length) { el.innerHTML = '<p class="muted">No reviews yet.</p>'; return; }
                el.innerHTML = r.data.slice(0, 6).map(a => `
                    <div class="card">
                        <div class="stars">${'★'.repeat(a.note)}${'☆'.repeat(5 - a.note)}</div>
                        <p>${a.comment ? a.comment.replace(/</g,'&lt;') : ''}</p>
                        <div class="muted">— ${(a.user_name || '').replace(/</g, '&lt;')}</div>
                    </div>
                `).join('');
            })
            .catch(() => {});
    </script>
</body>
</html>
