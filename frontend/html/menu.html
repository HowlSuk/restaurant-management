<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Menu - Le Gourmet</title>
    <link rel="stylesheet" href="css/menu.css">
</head>
<body>
    <header class="navbar" id="navbar"></header>

    <main class="container">
        <div class="row-between">
            <h1 class="page-title">Our Menu</h1>
            <div id="cart-info" class="muted"></div>
        </div>

        <div id="filters" class="mt-2"></div>

        <div id="plats" class="grid mt-3"></div>

        <section id="cart-section" class="mt-3 hidden">
            <h2>Your order</h2>
            <table class="table">
                <thead><tr><th>Item</th><th>Qty</th><th>Price</th><th></th></tr></thead>
                <tbody id="cart-body"></tbody>
            </table>
            <div class="row-between mt-2">
                <strong>Total: <span id="cart-total">0.00</span> €</strong>
                <button id="place-order" class="btn">Place order</button>
            </div>
            <div id="order-alert" class="mt-2"></div>
        </section>
    </main>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/menu.js"></script>
</body>
</html>
