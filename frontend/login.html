<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Le Gourmet</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <header class="navbar" id="navbar"></header>

    <main class="auth-wrapper">
        <div class="auth-card">
            <h1>Login</h1>
            <div id="alert"></div>
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn btn-block">Log in</button>
            </form>
            <p class="text-center mt-3 muted">
                No account? <a href="register.html">Register</a>
            </p>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        auth.renderNavbar();
        const alertBox = document.getElementById('alert');
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            alertBox.innerHTML = '';
            try {
                const r = await api.post('/auth/login', {
                    email:    document.getElementById('email').value,
                    password: document.getElementById('password').value,
                }, { auth: false });
                api.token.set(r.data.token);
                api.user.set(r.data.user);
                window.location.href = auth.getDashboardUrl(r.data.user.role);
            } catch (err) {
                alertBox.innerHTML = `<div class="alert error">${err.message}</div>`;
            }
        });
    </script>
</body>
</html>
