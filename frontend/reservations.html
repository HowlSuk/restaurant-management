<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reservations - Le Gourmet</title>
    <link rel="stylesheet" href="css/reservations.css">
</head>
<body>
    <header class="navbar" id="navbar"></header>

    <main class="container">
        <h1 class="page-title">Reservations</h1>

        <section class="card">
            <h3>New reservation</h3>
            <div id="alert"></div>
            <form id="reservation-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="date" required>
                    </div>
                    <div class="form-group">
                        <label>Time</label>
                        <input type="time" id="time" required>
                    </div>
                    <div class="form-group">
                        <label>People</label>
                        <input type="number" id="people" min="1" max="20" value="2" required>
                    </div>
                    <div class="form-group">
                        <label>Table (optional)</label>
                        <select id="table_id"><option value="">Any available</option></select>
                    </div>
                </div>
                <button class="btn" type="submit">Book</button>
            </form>
        </section>

        <section class="mt-3">
            <h3 style="margin-bottom:10px;">My reservations</h3>
            <div id="reservations"></div>
        </section>
    </main>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const user = auth.requireAuth();
        if (user) {
            auth.renderNavbar();

            async function loadTables() {
                try {
                    const r = await api.get('/tables', { auth: false });
                    const sel = document.getElementById('table_id');
                    (r.data || []).filter(t => t.status === 'available').forEach(t => {
                        sel.insertAdjacentHTML('beforeend', `<option value="${t.id}">Table #${t.number} (${t.capacity} seats)</option>`);
                    });
                } catch (e) { /* ignore */ }
            }

            async function loadReservations() {
                const el = document.getElementById('reservations');
                try {
                    const r = await api.get('/reservations');
                    const rows = r.data || [];
                    if (!rows.length) { el.innerHTML = '<p class="muted">No reservations yet.</p>'; return; }
                    el.innerHTML = `
                        <table class="table">
                            <thead>
                                <tr>
                                    ${user.role === 'admin'
                                        ? `<th>Customer</th><th>Email</th>`
                                        : ''
                                    }
                                    <th>Date</th>
                                    <th>Time</th>
                                    <th>People</th>
                                    <th>Table</th>
                                    <th>Status</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody>
                                ${rows.map(r => `
                                    <tr>
                                        ${user.role === 'admin'
                                        ? `<td>${r.customer_name || '-'}</td>
                                        <td>${r.customer_email || '-'}</td>`
                                        : ''
                                    }
                                        <td>${r.date}</td>
                                        <td>${r.time}</td>
                                        <td>${r.number_of_people}</td>
                                        <td>${r.table_id || '-'}</td>
                                        <td><span class="badge ${r.status}">${r.status}</span></td>
                                        <td><button class="btn btn-sm btn-danger" data-cancel="${r.id}">Cancel</button></td>
                                    </tr>`).join('')}
                            </tbody>
                        </table>`;
                    el.querySelectorAll('[data-cancel]').forEach(b => b.addEventListener('click', async () => {
                        if (!confirm('Cancel this reservation?')) return;
                        await api.del('/reservations/' + b.dataset.cancel);
                        loadReservations();
                    }));
                } catch (err) { el.innerHTML = `<div class="alert error">${err.message}</div>`; }
            }

            document.getElementById('reservation-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const alertBox = document.getElementById('alert');
                alertBox.innerHTML = '';
                try {
                    await api.post('/reservations', {
                        date:             document.getElementById('date').value,
                        time:             document.getElementById('time').value,
                        number_of_people: Number(document.getElementById('people').value),
                        table_id:         document.getElementById('table_id').value || null,
                    });
                    alertBox.innerHTML = '<div class="alert success">Reservation created!</div>';
                    e.target.reset();
                    loadReservations();
                } catch (err) {
                    alertBox.innerHTML = `<div class="alert error">${err.message}</div>`;
                }
            });

            loadTables();
            loadReservations();
        }
    </script>
</body>
</html>
